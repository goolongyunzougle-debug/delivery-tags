<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖配送地址标签系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .checkbox-custom:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen antialiased py-8 px-4 sm:px-6 lg:px-8">
    <div id="app" class="max-w-4xl mx-auto">
        
        <header class="text-center mb-10">
            <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                外卖地址配送标签系统
            </h1>
            <p class="mt-3 text-slate-400 text-sm sm:text-base max-w-xl mx-auto">
                数字化管理跑单避坑地址，让每一单都心中有数。全勾选后方可提交。
            </p>
        </header>

        <div v-if="isConfigMissing" class="mb-8 p-4 bg-amber-500/10 border border-amber-500/20 rounded-xl text-amber-300 text-sm">
            <p class="font-semibold mb-1">⚠️ 需要配置 Supabase 密钥</p>
            <p>请用代码编辑器打开本文件，搜索并修改 <code class="bg-amber-950/50 px-1 py-0.5 rounded text-amber-200">SUPABASE_URL</code> 和 <code class="bg-amber-950/50 px-1 py-0.5 rounded text-amber-200">SUPABASE_ANON_KEY</code>。</p>
        </div>

        <div v-if="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-2 border-emerald-500 border-t-transparent"></div>
            <p class="mt-4 text-slate-400 text-sm">正在加载地址库数据...</p>
        </div>

        <div v-else-if="addressList.length > 0" class="space-y-4">
            <div 
                v-for="(item, index) in addressList" 
                :key="item.id" 
                class="glass-card rounded-2xl p-5 transition-all duration-300 hover:border-slate-700/80"
                :class="{'border-emerald-500/30 ring-1 ring-emerald-500/20': item.selectedOptions.length > 0}"
            >
                <div class="flex items-start justify-between gap-4 mb-4">
                    <div class="flex items-start gap-3">
                        <span class="flex items-center justify-center w-6 h-6 rounded-lg bg-slate-800 text-xs font-bold text-slate-400 mt-0.5">
                            {{ index + 1 }}
                        </span>
                        <div>
                            <h3 class="text-base font-semibold text-slate-200">{{ item.address }}</h3>
                        </div>
                    </div>
                    <span 
                        v-if="item.selectedOptions.length > 0" 
                        class="flex items-center gap-1 text-xs font-medium text-emerald-400 bg-emerald-500/10 px-2.5 py-1 rounded-full border border-emerald-500/20"
                    >
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                        已选择
                    </span>
                    <span 
                        v-else 
                        class="text-xs font-medium text-slate-400 bg-slate-800/80 px-2.5 py-1 rounded-full border border-slate-700"
                    >
                        待选择
                    </span>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pl-9">
                    <label 
                        v-for="opt in options" 
                        :key="opt.id"
                        class="flex items-center gap-3 p-3 rounded-xl border cursor-pointer select-none transition-all duration-200"
                        :class="item.selectedOptions.includes(opt.text) 
                            ? opt.activeClass + ' border-transparent' 
                            : 'bg-slate-900/40 border-slate-800 text-slate-400 hover:bg-slate-800/50 hover:text-slate-300'"
                    >
                        <input 
                            type="checkbox" 
                            :value="opt.text"
                            v-model="item.selectedOptions"
                            class="checkbox-custom appearance-none w-4.5 h-4.5 rounded border border-slate-600 bg-slate-800 checked:bg-emerald-500 checked:border-transparent focus:outline-none transition-all duration-150 cursor-pointer"
                        />
                        <span class="text-sm font-medium">{{ opt.text }}</span>
                    </label>
                </div>
            </div>

            <div class="mt-8 glass-card rounded-2xl p-4 flex flex-col sm:flex-row items-center justify-between gap-4 sticky bottom-4 shadow-2xl">
                <div class="text-sm text-slate-400 text-center sm:text-left">
                    进度：<span class="font-bold text-slate-200">{{ completedCount }}</span> / <span class="text-slate-500">{{ addressList.length }}</span> 个地址已选定
                </div>
                <button 
                    @click="submitData"
                    :disabled="!canSubmit || submitting"
                    class="w-full sm:w-auto px-8 py-3 rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center gap-2 cursor-pointer shadow-lg disabled:cursor-not-allowed"
                    :class="canSubmit 
                        ? 'bg-gradient-to-r from-emerald-500 to-teal-600 text-white hover:from-emerald-400 hover:to-teal-500 shadow-emerald-900/20 hover:scale-[1.02]' 
                        : 'bg-slate-800 text-slate-500 border border-slate-700/50'"
                >
                    <span v-if="submitting" class="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></span>
                    {{ submitting ? '正在提交同步...' : '提交数据成功' }}
                </button>
            </div>
        </div>

        <div v-else class="text-center py-20 glass-card rounded-2xl">
            <p class="text-slate-400">所有地址已标记完成，或者数据库里暂时没有未处理的地址。</p>
        </div>

        <div v-if="toast.show" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 transform transition-all duration-300">
            <div :class="toast.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'" class="px-6 py-3 rounded-xl shadow-xl font-medium text-sm flex items-center gap-2">
                <span>{{ toast.message }}</span>
            </div>
        </div>

    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        // 🟢 已自动保留你配置好的真实凭证
        const SUPABASE_URL = "https://ybjgkfhcagqqfnqekycr.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamdrZmhjYWdxcWZucWVreWNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTk0OTUsImV4cCI6MjA5NzI3NTQ5NX0.jG4Hm9JPPBQ9J4jQKCtZDa5MDF_vGYlUo7drur8Xv6g";

        createApp({
            setup() {
                const addressList = ref([]);
                const loading = ref(true);
                const submitting = ref(false);
                const isConfigMissing = ref(SUPABASE_URL.includes("YOUR_"));
                const toast = ref({ show: false, message: '', type: 'success' });

                const options = [
                    { id: 1, text: "超级容易送", activeClass: "bg-emerald-500/10 text-emerald-400 border-emerald-500/30" },
                    { id: 2, text: "不能骑车", activeClass: "bg-amber-500/10 text-amber-400 border-amber-500/30" },
                    { id: 3, text: "卡电梯", activeClass: "bg-rose-500/10 text-rose-400 border-rose-500/30" },
                    { id: 4, text: "其他原因不好配送", activeClass: "bg-indigo-500/10 text-indigo-400 border-indigo-500/30" }
                ];

                // 🛠️ 修复核心：显式调用 window.supabase 避免变量重名冲突
                let supabaseClient = null;
                if (!isConfigMissing.value) {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                }

                const showToast = (msg, type = 'success') => {
                    toast.value = { show: true, message: msg, type };
                    setTimeout(() => { toast.value.show = false; }, 3000);
                };

                const fetchAddresses = async () => {
                    if (isConfigMissing.value) return;

                    try {
                        loading.value = true;
                        // 只拉取 is_completed 为 false 的未标记地址
                        const { data, error } = await supabaseClient
                            .from('delivery_addresses')
                            .select('*')
                            .eq('is_completed', false)
                            .order('id', { ascending: true });

                        if (error) throw error;

                        addressList.value = data.map(item => ({
                            id: item.id,
                            address: item.address,
                            selectedOptions: Array.isArray(item.tags) ? item.tags : []
                        }));
                    } catch (err) {
                        showToast("抓取数据失败: " + err.message, "error");
                        console.error(err);
                    } finally {
                        loading.value = false;
                    }
                };

                const completedCount = computed(() => {
                    return addressList.value.filter(item => item.selectedOptions.length > 0).length;
                });

                const canSubmit = computed(() => {
                    if (addressList.value.length === 0) return false;
                    return addressList.value.every(item => item.selectedOptions.length > 0);
                });

                const submitData = async () => {
                    if (!canSubmit.value || submitting.value || isConfigMissing.value) return;

                    try {
                        submitting.value = true;
                        
                        const updates = addressList.value.map(item => ({
                            id: item.id,
                            address: item.address,
                            tags: item.selectedOptions, 
                            is_completed: true          
                        }));

                        const { error } = await supabaseClient
                            .from('delivery_addresses')
                            .upsert(updates, { onConflict: 'id' });

                        if (error) throw error;

                        showToast("数据全部同步成功！");
                        setTimeout(() => {
                            fetchAddresses();
                        }, 1500);

                    } catch (err) {
                        showToast("提交失败: " + err.message, "error");
                        console.error(err);
                    } finally {
                        submitting.value = false;
                    }
                };

                onMounted(() => {
                    fetchAddresses();
                });

                return {
                    addressList,
                    options,
                    loading,
                    submitting,
                    isConfigMissing,
                    completedCount,
                    canSubmit,
                    toast,
                    submitData
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
